services:
  db:
    image: pgvector/pgvector:pg16 # Uses Postgres 16 with pgvector
    container_name: postgres_vector
    restart: always
    environment:
      POSTGRES_USER: ${DATABASE_USER:-postgres_dsn}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-password}
      POSTGRES_DB: ${DATABASE_NAME:-vectordb}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-postgres} -d ${DATABASE_NAME:-vectordb}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: